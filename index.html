<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的股票看板</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stock-name { font-size: 1.5em; font-weight: bold; color: #333; }
        .price { font-size: 2em; color: #e63946; font-weight: bold; }
        .metric { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .analysis { background: #e8f4fd; padding: 15px; border-radius: 8px; margin-top: 15px; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>📈 每日收盘看板</h1>
    <div id="content"></div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                let html = '';
                for (let key in data) {
                    const stock = data[key];
                    html += `
                        <div class="card">
                            <div class="stock-name">${stock.name}</div>
                            <div class="price">¥${stock.price} (${stock.change_pct}%)</div>
                            <div class="metric"><span>PE-TTM:</span> <span>${stock.pe_ttm}</span></div>
                            <div class="analysis"><strong>💡 分析结论：</strong><br>${stock.analysis}</div>
                        </div>
                    `;
                }
                document.getElementById('content').innerHTML = html;
            });
    </script>
</body>
</html>
